name: Build and deploy Node.js app to Azure Web App - kududash-frontend1

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install all dependencies
        working-directory: './frontend'
        run: npm install

      - name: Build React app
        working-directory: './frontend'
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_AUTH0_DOMAIN: ${{ secrets.REACT_APP_AUTH0_DOMAIN }}
          REACT_APP_AUTH0_CLIENT_ID: ${{ secrets.REACT_APP_AUTH0_CLIENT_ID }}
          REACT_APP_AUTH0_AUDIENCE: ${{ secrets.REACT_APP_AUTH0_AUDIENCE }}
        run: npm run build

      - name: Run tests
        working-directory: './frontend'
        run: npm run test -- --passWithNoTests

      - name: Install production dependencies only
        working-directory: './frontend'
        run: npm install --production

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            ./frontend/build
            ./frontend/server.js
            ./frontend/package.json
            ./frontend/package-lock.json
            ./frontend/node_modules

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_964B0BD64DD942099AED9422E51D3D1F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A967C4B51C9147ACA9AA624BD6825A55 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AE2CE706A1F744A1AECD87C6AEAD5985 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kududash-frontend1'
          slot-name: 'Production'
          package: .